<!DOCTYPE html>
<html lang="zh">
<head>
  <title>愤怒的小鸟 · AB China</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="full-screen" content="true" />
  <meta name="x5-fullscreen" content="true" />
  <meta name="360-fullscreen" content="true" />
  <meta name="laya" screenorientation="landscape" />
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
  <script type="text/javascript">
    window.screenOrientation = "sensor_landscape";
    function loadLib(url) {
      document.write('<script type="text/javascript" src="' + url + '"><\/script>');
    }
  </script>

  <!-- Neutralize WeChat minigame hooks before the game bundle runs -->
  <script type="text/javascript" src="wx-shim.js"></script>

  <!-- LayaAir browser runtimes (NOT the wxmini adapter), in dependency order -->
  <script type="text/javascript">
    loadLib("libs/laya.core.js");
    loadLib("libs/laya.ani.js");
    loadLib("libs/laya.html.js");
    loadLib("libs/laya.ui.js");
    loadLib("libs/laya.d3.js");
    loadLib("libs/laya.physics.js");
    loadLib("libs/fairygui.js");
    loadLib("libs/rawinflate.min.js");
    loadLib("js/bundle.js");
  </script>
</body>
</html>
